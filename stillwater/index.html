<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stillwater</title>
<style>
  :root{
    --ink:#0B1020; --moon:#F2E9D8; --moon55:rgba(242,233,216,.55); --moon30:rgba(242,233,216,.30);
  }
  html,body{margin:0;padding:0;background:var(--ink);overflow:hidden;height:100%;}
  body{touch-action:none;-webkit-user-select:none;user-select:none;cursor:crosshair;}
  canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block;}
  #glc{z-index:1}
  #ovl{z-index:2;pointer-events:none}
  #hud{position:fixed;inset:0;z-index:3;pointer-events:none;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  #title{position:absolute;top:22px;left:26px;color:var(--moon);
       font-family:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
       font-size:19px;letter-spacing:.34em;text-transform:uppercase;opacity:.82;}
  #title small{display:block;font-size:10.5px;letter-spacing:.22em;text-transform:none;
       font-style:italic;opacity:.62;margin-top:5px;letter-spacing:.08em;}
  #ctl{position:absolute;top:22px;right:24px;display:flex;gap:10px;align-items:center;pointer-events:auto;}
  .btn{background:rgba(11,16,32,.5);border:1px solid var(--moon30);color:var(--moon55);
       font-size:10px;letter-spacing:.16em;text-transform:uppercase;padding:6px 13px;border-radius:999px;
       cursor:pointer;transition:color .25s,border-color .25s;}
  .btn:hover,.btn:focus-visible{color:var(--moon);border-color:var(--moon55);outline:none;}
  .btn.on{color:var(--moon);border-color:var(--moon55);}
  #daywrap{display:flex;align-items:center;gap:8px;color:var(--moon30);font-size:9px;
       letter-spacing:.18em;text-transform:uppercase;}
  #day{-webkit-appearance:none;appearance:none;width:92px;height:2px;border-radius:2px;cursor:pointer;
       background:linear-gradient(90deg,#E8A06B,#24354F 50%,#F3D9A4);outline:none;}
  #day::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;
       background:var(--moon);border:none;box-shadow:0 0 6px rgba(242,233,216,.6);}
  #day::-moz-range-thumb{width:11px;height:11px;border-radius:50%;background:var(--moon);border:none;}
  #day:focus-visible{box-shadow:0 0 0 2px var(--moon30);}
  #hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
       color:var(--moon55);font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
       font-style:italic;font-size:14.5px;letter-spacing:.04em;white-space:nowrap;
       transition:opacity 1.2s;opacity:0;text-shadow:0 1px 8px rgba(11,16,32,.8);}
  #fps{position:absolute;bottom:10px;left:12px;color:var(--moon55);font-size:11px;display:none;
       font-variant-numeric:tabular-nums;letter-spacing:.05em;background:rgba(11,16,32,.5);
       padding:3px 8px;border-radius:6px;}
  #nogl{position:absolute;inset:0;display:none;place-items:center;color:var(--moon55);
       font-family:Georgia,serif;font-style:italic;font-size:15px;text-align:center;padding:30px;}
  @media (prefers-reduced-motion:reduce){ .btn{transition:none} #hint{transition:opacity .3s} }
</style>

<canvas id="glc"></canvas>
<canvas id="ovl"></canvas>
<div id="hud">
  <div id="title">Stillwater<small>a pocket pond — flick a stone across it</small></div>
  <div id="ctl">
    <button class="btn on" id="bSound" aria-label="toggle sound">sound</button>
    <button class="btn" id="bRain" aria-label="toggle rain">rain</button>
    <span id="daywrap">dusk <input type="range" id="day" min="0" max="1000" value="60" aria-label="time of day"> dawn</span>
  </div>
  <div id="hint"></div>
  <div id="fps"></div>
  <div id="nogl">this pond needs WebGL2 to hold its water —<br>please try a newer browser.</div>
</div>

<script>
'use strict';
/* ============================================================ *
 *  STILLWATER — a pocket pond
 *  CPU wave-equation water · WebGL2 refraction · WebAudio synth
 * ============================================================ */
const DEBUG = /[?&]debug/.test(location.search);
const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;
const TUNE = window.TUNE = {
  waveC: 0.42, damp: 0.9955, refr: 0.015, nrm: 0.65, foamLo: 0.015, foamHi: 0.12,
  gravity: 2300, skipMin: 300,
};

/* ---------- canvases ---------- */
const glc = document.getElementById('glc');
const ovl = document.getElementById('ovl');
const octx = ovl.getContext('2d');
let W = innerWidth, H = innerHeight;
let DPR_CAP = 2, dpr = Math.min(devicePixelRatio || 1, DPR_CAP);

/* ---------- wave simulation (CPU) ---------- */
const SW = 232;
let SH = Math.max(96, Math.min(200, Math.round(SW * H / W)));
let U = new Float32Array(SW * SH), V = new Float32Array(SW * SH);
let sponge = new Float32Array(SW * SH);
function buildSponge() {
  const M = 10;
  for (let y = 0; y < SH; y++) for (let x = 0; x < SW; x++) {
    const d = Math.min(x, y, SW - 1 - x, SH - 1 - y);
    sponge[y * SW + x] = d >= M ? 1 : 0.86 + 0.14 * (d / M);
  }
}
buildSponge();
let waterEnergy = 0;
function stepWater(scale) {
  const c = TUNE.waveC * scale, dmp = TUNE.damp;
  let e = 0;
  for (let y = 1; y < SH - 1; y++) {
    let i = y * SW + 1;
    for (let x = 1; x < SW - 1; x++, i++) {
      const lap = U[i - 1] + U[i + 1] + U[i - SW] + U[i + SW] - 4 * U[i];
      V[i] = (V[i] + lap * c) * dmp * sponge[i];
    }
  }
  for (let y = 1; y < SH - 1; y++) {
    let i = y * SW + 1;
    for (let x = 1; x < SW - 1; x++, i++) {
      U[i] = (U[i] + V[i] * scale) * sponge[i];
      if ((i & 7) === 0) e += Math.abs(V[i]);
    }
  }
  waterEnergy = waterEnergy * 0.92 + e * 0.08;
}
function splat(px, py, radius, amp, intoU) {
  const gx = px / W * SW, gy = py / H * SH;
  const r = Math.max(1.4, radius), r2 = r * r;
  const x0 = Math.max(1, Math.floor(gx - r * 2)), x1 = Math.min(SW - 2, Math.ceil(gx + r * 2));
  const y0 = Math.max(1, Math.floor(gy - r * 2)), y1 = Math.min(SH - 2, Math.ceil(gy + r * 2));
  const dst = intoU ? U : V;
  for (let y = y0; y <= y1; y++) for (let x = x0; x <= x1; x++) {
    const dx = x - gx, dy = y - gy, d2 = dx * dx + dy * dy;
    if (d2 < r2 * 4) dst[y * SW + x] += amp * Math.exp(-d2 / r2);
  }
  rippleEvents.push({ x: px, y: py, amp: Math.abs(amp), t: nowS });
  if (rippleEvents.length > 24) rippleEvents.shift();
}
function heightAt(px, py) {
  let gx = px / W * SW - 0.5, gy = py / H * SH - 0.5;
  gx = Math.max(0, Math.min(SW - 2, gx)); gy = Math.max(0, Math.min(SH - 2, gy));
  const x0 = gx | 0, y0 = gy | 0, fx = gx - x0, fy = gy - y0, i = y0 * SW + x0;
  return (U[i] * (1 - fx) + U[i + 1] * fx) * (1 - fy) + (U[i + SW] * (1 - fx) + U[i + SW + 1] * fx) * fy;
}
function slopeAt(px, py) {
  const e = 6;
  return [heightAt(px + e, py) - heightAt(px - e, py), heightAt(px, py + e) - heightAt(px, py - e)];
}
const rippleEvents = [];

/* ---------- WebGL2 display ---------- */
const gl = glc.getContext('webgl2', { antialias: false, alpha: false });
if (!gl) { document.getElementById('nogl').style.display = 'grid'; }
const VSH = `#version 300 es
layout(location=0) in vec2 p; out vec2 vUV;
void main(){ vUV = p*0.5+0.5; gl_Position = vec4(p,0.,1.); }`;
const FSH = `#version 300 es
precision highp float;
in vec2 vUV; out vec4 outC;
uniform highp sampler2D uH; uniform sampler2D uUnder;
uniform vec2 uSim; uniform vec2 uRes;
uniform float uTime, uDay, uRefr, uNrm, uFoamLo, uFoamHi, uMotion;
float hat(ivec2 c){ c = clamp(c, ivec2(0), ivec2(uSim)-1); return texelFetch(uH,c,0).r; }
float hbi(vec2 uv){
  vec2 p = uv*uSim - 0.5; ivec2 i = ivec2(floor(p)); vec2 f = fract(p);
  return mix(mix(hat(i),hat(i+ivec2(1,0)),f.x), mix(hat(i+ivec2(0,1)),hat(i+ivec2(1,1)),f.x), f.y);
}
float hash21(vec2 p){ vec3 q = fract(vec3(p.xyx)*.1031); q += dot(q, q.yzx+33.33); return fract((q.x+q.y)*q.z); }
vec3 sky(vec2 p, float wD, float wN, float wA){
  float t = pow(clamp(p.y,0.,1.), 1.35);
  vec3 dB=vec3(.145,.129,.243), dM=vec3(.42,.28,.44), dT=vec3(.84,.55,.47); // dusk
  vec3 nB=vec3(.027,.051,.118), nM=vec3(.063,.110,.212), nT=vec3(.141,.208,.310); // night
  vec3 aB=vec3(.231,.259,.365), aM=vec3(.773,.545,.627), aT=vec3(.953,.851,.643); // dawn
  vec3 B=dB*wD+nB*wN+aB*wA, M=dM*wD+nM*wN+aM*wA, T=dT*wD+nT*wN+aT*wA;
  vec3 c = mix(B, M, smoothstep(0., .62, t));
  c = mix(c, T, smoothstep(.5, 1., t));
  // stars, only meaningfully at night
  vec2 sp = floor(p*vec2(170.,105.));
  float st = hash21(sp);
  float tw = .6 + .4*sin(uTime*(1.5+3.*hash21(sp+9.)) + hash21(sp+4.)*6.28);
  c += vec3(.9,.95,1.)*step(.9962, st)*wN*.5*tw;
  // moon
  vec2 mp = vec2(.74,.78);
  float md = length((p-mp)*vec2(uRes.x/uRes.y,1.));
  float moonI = .22 + wN*.95 + wA*.15;
  c += vec3(.95,.93,.85)*((1.0-smoothstep(.015,.024,md))*.95 + exp(-md*6.5)*.26)*moonI;
  return c;
}
void main(){
  vec2 suv = vec2(vUV.x, 1.-vUV.y);           // canvas-space (y down)
  vec2 e = 1./uSim;
  float h0  = hbi(suv);
  float hxp = hbi(suv+vec2(e.x,0.)), hxm = hbi(suv-vec2(e.x,0.));
  float hyp = hbi(suv+vec2(0.,e.y)), hym = hbi(suv-vec2(0.,e.y));
  float gx = hxp - hxm;
  float gy = hyp - hym;
  // micro shimmer so the pond breathes even when still
  vec2 mg = vec2(
    sin(suv.x*150.+uTime*1.25)+sin((suv.x+suv.y)*88.-uTime*.8),
    cos(suv.y*132.-uTime*1.05)+cos((suv.y-suv.x)*104.+uTime*.65))*.0032*uMotion;
  vec2 g = vec2(gx,gy) + mg;
  float wN = clamp(1.-abs(uDay-.5)*2., 0., 1.);
  float wD = clamp(1.-uDay*2., 0., 1.);
  float wA = clamp(uDay*2.-1., 0., 1.);
  // refracted underwater world
  vec2 ruv = clamp(suv + g*uRefr*22., vec2(.001), vec2(.999));
  vec3 under = texture(uUnder, ruv).rgb;
  under *= (0.85 + 0.35*wA + 0.10*wD) * (1.0 - 0.45*wN);
  // sky reflection — stronger toward the far edge, see-through up close
  vec3 n3 = normalize(vec3(-g.x*uNrm*20., -g.y*uNrm*20., 1.));
  vec2 rp = vec2(vUV.x + g.x*2.4, vUV.y - g.y*2.4);
  vec3 skyC = sky(rp, wD, wN, wA);
  float slope = clamp(length(g)*12., 0., 1.);
  float mixAmt = .14 + .34*pow(clamp(vUV.y,0.,1.), 1.6) + .30*slope;
  vec3 col = mix(under, skyC, mixAmt);
  // moon glints
  vec3 L = normalize(vec3(.38,.52,.62));
  vec3 Hv = normalize(L + vec3(0.,0.,1.));
  float moonI = .25 + wN*1.0 + wA*.2;
  col += vec3(.96,.92,.82)*pow(max(dot(n3,Hv),0.), 90.)*moonI*.6;
  // crest foam + night bioluminescence
  float lap = hxp+hxm+hyp+hym-4.*h0;
  float crest = smoothstep(uFoamLo, uFoamHi, abs(lap));
  col = mix(col, vec3(.85,.88,.86), crest*.14);
  col += vec3(.25,.85,.66)*crest*crest*wN*.5;
  // vignette + grain
  float vd = length(vUV-.5);
  col *= 1. - .38*smoothstep(.42,.88,vd);
  col += (hash21(suv*uRes+uTime)-.5)*.014;
  outC = vec4(pow(max(col,0.), vec3(.96)), 1.);
}`;
let prog, texH, texU, uni = {}, glOK = false, texUW = 0, texUH = 0;
function initGL() {
  if (!gl) return;
  glOK = false; texUW = 0; texUH = 0;
  const mk = (t, s) => { const sh = gl.createShader(t); gl.shaderSource(sh, s); gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(sh)); return sh; };
  prog = gl.createProgram();
  gl.attachShader(prog, mk(gl.VERTEX_SHADER, VSH));
  gl.attachShader(prog, mk(gl.FRAGMENT_SHADER, FSH));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
  for (const n of ['uH','uUnder','uSim','uRes','uTime','uDay','uRefr','uNrm','uFoamLo','uFoamHi','uMotion'])
    uni[n] = gl.getUniformLocation(prog, n);
  gl.pixelStorei(gl.UNPACK_ALIGNMENT, 1);
  texH = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, texH);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.R32F, SW, SH, 0, gl.RED, gl.FLOAT, U);
  texU = gl.createTexture();
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, texU);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.uniform1i(uni.uH, 0); gl.uniform1i(uni.uUnder, 1);
  gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);
  gl.viewport(0, 0, glc.width, glc.height);
  glOK = true;
  undDirtySize = true;
}
glc.addEventListener('webglcontextlost', e => { e.preventDefault(); glOK = false; });
glc.addEventListener('webglcontextrestored', () => {
  try { initGL(); } catch (err) { console.error(err); }
});

/* ---------- underwater world (Canvas2D, half res) ---------- */
const und = document.createElement('canvas');
const uctx = und.getContext('2d');
const bed = document.createElement('canvas');
let uScale = 0.5, undDirtySize = true, bctx = null;
function paintBed() {
  const w = und.width, h = und.height;
  bed.width = w; bed.height = h;
  const b = bctx = bed.getContext('2d');
  const grad = b.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#10262B'); grad.addColorStop(0.6, '#0C1E24'); grad.addColorStop(1, '#0A181E');
  b.fillStyle = grad; b.fillRect(0, 0, w, h);
  // pebbles — muted, low contrast
  const rnd = mulberry(7);
  const cols = ['#20343A','#273530','#2A3A40','#1D3038','#2E3B33','#33403F','#243239'];
  for (let i = 0; i < 680; i++) {
    const x = rnd() * w, y = rnd() * h, r = (2 + rnd() * 6) * uScale * 2;
    b.fillStyle = cols[(rnd() * cols.length) | 0];
    b.globalAlpha = 0.45 + rnd() * 0.35;
    b.beginPath(); b.ellipse(x, y, r, r * (0.6 + rnd() * 0.3), rnd() * 3.14, 0, 6.29); b.fill();
    b.globalAlpha = 0.10;
    b.fillStyle = '#5A6E6A';
    b.beginPath(); b.ellipse(x - r * 0.25, y - r * 0.28, r * 0.5, r * 0.3, 0, 0, 6.29); b.fill();
  }
  b.globalAlpha = 1;
  // soft dark pooling
  for (let i = 0; i < 14; i++) {
    const x = rnd() * w, y = rnd() * h, r = (40 + rnd() * 120) * uScale * 2;
    const g = b.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, 'rgba(6,14,18,0.35)'); g.addColorStop(1, 'rgba(6,14,18,0)');
    b.fillStyle = g; b.fillRect(x - r, y - r, r * 2, r * 2);
  }
  // the pond's memory: every stone ever sunk, back where it fell
  for (const st of sunk) stampStone(st);
}
function stampStone(st) {
  if (!bctx) return;
  const s = und.width / W;
  const x = st.x * W * s, y = st.y * H * s, r = st.r * s;
  bctx.save(); bctx.translate(x, y); bctx.rotate(st.a);
  bctx.fillStyle = st.c; bctx.globalAlpha = 0.92;
  bctx.beginPath(); bctx.ellipse(0, 0, r, r * 0.72, 0, 0, 6.29); bctx.fill();
  bctx.globalAlpha = 0.25; bctx.fillStyle = '#AEB9BD';
  bctx.beginPath(); bctx.ellipse(-r * 0.2, -r * 0.22, r * 0.5, r * 0.3, 0, 0, 6.29); bctx.fill();
  bctx.restore(); bctx.globalAlpha = 1;
}
function mulberry(a) { return function() { a |= 0; a = a + 0x6D2B79F5 | 0;
  let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

/* sunken stones — the pond remembers */
let sunk = [];
try { sunk = JSON.parse(localStorage.getItem('stillwater.stones') || '[]').slice(-220); } catch (e) {}
function saveSunk() { try { localStorage.setItem('stillwater.stones', JSON.stringify(sunk.slice(-220))); } catch (e) {} }

/* koi */
const KOI_COLS = [['#C96F3F','#E8A87C'], ['#B9552F','#DE9468'], ['#D8C9A8','#EFE6CE']];
const koi = [];
function makeKoi(i) {
  const segs = [];
  const x = W * (0.2 + Math.random() * 0.6), y = H * (0.2 + Math.random() * 0.6);
  for (let s = 0; s < 11; s++) segs.push({ x: x - s * 7, y });
  return { x, y, heading: Math.random() * 6.28, speed: 22, segs, col: KOI_COLS[i % 3],
    state: 'wander', target: null, wt: Math.random() * 100, nibbleT: 0, fleeV: 0, size: 0.85 + Math.random() * 0.35 };
}
for (let i = 0; i < 3; i++) koi.push(makeKoi(i));
const bubbles = [];

function updateKoi(dt) {
  for (const k of koi) {
    k.wt += dt;
    let desired = null, speed = 22 * k.size;
    // gentle recent ripples attract; big ones scare
    if (k.state === 'wander' || k.state === 'investigate') {
      let cx = 0, cy = 0, n = 0;
      for (const r of rippleEvents) {
        if (nowS - r.t > 4) continue;
        const d = Math.hypot(r.x - k.x, r.y - k.y);
        if (r.amp < 0.5 && d < 420) { cx += r.x; cy += r.y; n++; }
      }
      if (n > 0) { k.state = 'investigate'; k.target = { x: cx / n, y: cy / n }; }
    }
    if (holdPt && k.state !== 'flee') { k.state = 'investigate'; k.target = holdPt; }
    if (k.state === 'investigate' && k.target) {
      const d = Math.hypot(k.target.x - k.x, k.target.y - k.y);
      speed = 46 * k.size;
      desired = Math.atan2(k.target.y - k.y, k.target.x - k.x);
      if (d < 30) {
        speed = 6;
        k.nibbleT += dt;
        if (k.nibbleT > 0.7) {
          k.nibbleT = 0;
          splat(k.x, k.y, 1.8, 0.18, false);
          bubbles.push({ x: k.x + (Math.random() - 0.5) * 8, y: k.y, r: 1.5 + Math.random() * 2, vy: -14, life: 1.6 });
          audio.nibble(k.x / W);
        }
        if (!holdPt && Math.random() < dt * 0.4) { k.state = 'wander'; k.target = null; }
      }
      if (!holdPt && k.target !== holdPt && Math.random() < dt * 0.12) { k.state = 'wander'; k.target = null; }
    }
    if (k.state === 'flee') {
      speed = 90 * k.size + k.fleeV;
      k.fleeV *= Math.pow(0.25, dt);
      if (k.fleeV < 10) k.state = 'wander';
    }
    if (desired === null) {
      k.heading += (Math.sin(k.wt * 0.7) + Math.sin(k.wt * 0.31 + 2.1)) * 0.35 * dt * 2;
      // steer away from edges
      const m = 90;
      if (k.x < m) k.heading = lerpAngle(k.heading, 0, dt * 2);
      if (k.x > W - m) k.heading = lerpAngle(k.heading, Math.PI, dt * 2);
      if (k.y < m) k.heading = lerpAngle(k.heading, Math.PI / 2, dt * 2);
      if (k.y > H - m) k.heading = lerpAngle(k.heading, -Math.PI / 2, dt * 2);
    } else {
      k.heading = lerpAngle(k.heading, desired, dt * (k.state === 'flee' ? 6 : 2.2));
    }
    // night: koi slow and drowsy
    speed *= 1 - 0.55 * nightW;
    k.x += Math.cos(k.heading) * speed * dt;
    k.y += Math.sin(k.heading) * speed * dt;

/* ---------- lilypads ---------- */
const pads = [];

  const rnd = mulberry(21);
  for (let i = 0; i < 5; i++) {
    const r = 24 + i * 6.5;

/* ---------- stones in flight ---------- */

  stones.push({ x, y, vx, vy, z: 10, vz: 230, spin, rot: Math.random() * 6.28,
    skips: 0, r: 8 + Math.random() * 3, c: STONE_COLS[(Math.random() * 4) | 0], sinkT: -1 });

}

        sunk.push(st);

        s.vx *= 0.86; s.vy *= 0.86;

    }
    if (s.z <= 0 && s.vz < 0) {

/* rain */

    plop(vel, pan) { if (!ctx || !voiceOK()) return;
      const t0 = ctx.currentTime;
      const o = ctx.createOscillator();
      o.frequency.setValueAtTime(280 + vel * 160, t0);
      o.frequency.exponentialRampToValueAtTime(70, t0 + 0.14);
      const g = envGain(t0, 0.10 + vel * 0.18, 0.22);
      o.connect(g); o.start(t0); o.stop(t0 + 0.32); reap(o, [g, send(g, pan, 1, 1)]); },
    sink(pan) { if (!ctx || !voiceOK()) return;
      const t0 = ctx.currentTime;
      const o = ctx.createOscillator();
      o.frequency.setValueAtTime(200, t0);
      o.frequency.exponentialRampToValueAtTime(52, t0 + 0.5);
      const g = envGain(t0, 0.22, 0.6);
      o.connect(g); o.start(t0); o.stop(t0 + 0.7); reap(o, [g, send(g, pan, 1, 1)]); },
    whoosh(k) { if (!ctx) return;
      noiseGain.gain.cancelScheduledValues(ctx.currentTime);
      noiseGain.gain.setTargetAtTime(0.1 + k * 0.1, ctx.currentTime, 0.02);
      noiseGain.gain.setTargetAtTime(0.02, ctx.currentTime + 0.1, 0.3); },
    nibble(pan) { tone(mtf(rootMidi() + 36), 0.03, 0.25, pan, 0); },
    glissando() { if (!ctx) return; const s = scale();
      for (let i = 0; i < 6; i++) {
        const m = rootMidi() + 12 + s[i % s.length] + 12 * ((i / s.length) | 0);
        setTimeout(() => tone(mtf(m), 0.12, 1.2, 0.5, 4.0), i * 90);
      } },
  };
})();

/* seasons: dusk → night → dawn, palette + scale together */
let dayT = 0.06, nightW = 0, seasonIdx = 0, autoDayDir = 1;
const SEASONS = [
  { until: 0.34, root: 57, scale: [0, 3, 5, 7, 10] },   // A minor pentatonic
  { until: 0.70, root: 50, scale: [0, 3, 5, 7, 10] },   // D dorian pentatonic
  { until: 1.01, root: 48, scale: [0, 2, 4, 7, 9] },    // C major pentatonic
];
function rootMidi() { return SEASONS[seasonIdx].root; }
function scale() { return SEASONS[seasonIdx].scale; }
function setDay(t, fromUser) {
  dayT = Math.max(0, Math.min(1, t));
  nightW = Math.max(0, 1 - Math.abs(dayT - 0.5) * 2);
  const si = SEASONS.findIndex(s => dayT < s.until);
  if (si !== seasonIdx) { seasonIdx = si; audio.glideRoot(); }
  if (fromUser) { dayEl.value = Math.round(dayT * 1000); markHint('day'); }
}

/* ---------- input FSM ---------- */
let holdPt = null, idleT = 0, lastTapT = 0, lastTapX = 0, lastTapY = 0;
const ptr = { down: false, id: -1, sx: 0, sy: 0, x: 0, y: 0, t0: 0, path: 0,
  trail: [], pad: null, holdTimer: 0, moved: false };
const extra = new Map();
function onDown(e) {
  idleT = 0;
  audio.unlock();
  if (ptr.down) { extra.set(e.pointerId, { x: e.clientX, y: e.clientY }); return; }
  ptr.down = true; ptr.id = e.pointerId;
  ptr.sx = ptr.x = e.clientX; ptr.sy = ptr.y = e.clientY;
  ptr.t0 = nowS; ptr.path = 0; ptr.moved = false; ptr.holdTimer = 0;
  ptr.trail = [{ x: e.clientX, y: e.clientY, t: nowS }];
  ptr.pad = padAt(e.clientX, e.clientY);
  if (ptr.pad) { ptr.pad.grabbed = true; ptr.pad.gox = ptr.pad.x - e.clientX; ptr.pad.goy = ptr.pad.y - e.clientY; }
}
function onMove(e) {
  idleT = 0;
  if (extra.has(e.pointerId)) {
    const p = extra.get(e.pointerId);
    const sp = Math.hypot(e.clientX - p.x, e.clientY - p.y);
    if (sp > 1) splat(e.clientX, e.clientY, 2, Math.min(0.5, sp * 0.02), false);
    p.x = e.clientX; p.y = e.clientY;
    return;
  }
  if (!ptr.down || e.pointerId !== ptr.id) {
    // hover wake — the pond answers before you even press
    if (!ptr.down && e.pointerType === 'mouse') {
      const last = hoverLast;
      const sp = last ? Math.hypot(e.clientX - last.x, e.clientY - last.y) : 0;
      if (sp > 2) splat(e.clientX, e.clientY, 1.5, Math.min(0.12, sp * 0.005), false);
      hoverLast = { x: e.clientX, y: e.clientY };
    }
    return;
  }
  const dx = e.clientX - ptr.x, dy = e.clientY - ptr.y;
  const d = Math.hypot(dx, dy);
  ptr.path += d;
  if (ptr.path > 10) ptr.moved = true;
  if (ptr.pad) {
    ptr.pad.x = Math.max(ptr.pad.r, Math.min(W - ptr.pad.r, e.clientX + ptr.pad.gox));
    ptr.pad.y = Math.max(ptr.pad.r, Math.min(H - ptr.pad.r, e.clientY + ptr.pad.goy));
    if (d > 1) splat(ptr.pad.x, ptr.pad.y, 2.6, Math.min(0.4, d * 0.015), false);
    markHint('pad');
  } else if (d > 0.5) {
    splat(e.clientX, e.clientY, 2.1, Math.min(0.8, d * 0.03), false);
    if (ptr.moved) markHint('drag');
  }
  ptr.x = e.clientX; ptr.y = e.clientY;
  ptr.trail.push({ x: e.clientX, y: e.clientY, t: nowS });
  while (ptr.trail.length > 24 || (ptr.trail.length > 2 && nowS - ptr.trail[0].t > 0.24)) ptr.trail.shift();
  if (holdPt && ptr.moved) holdPt = null;
}
let hoverLast = null;
function onUp(e) {
  if (extra.has(e.pointerId)) { extra.delete(e.pointerId); return; }
  if (!ptr.down || e.pointerId !== ptr.id) return;
  ptr.down = false;
  holdPt = null;
  const dur = nowS - ptr.t0;
  if (ptr.pad) {
    if (!ptr.moved && dur < 0.25) strikePad(ptr.pad, 0.7);
    ptr.pad.grabbed = false; ptr.pad = null;
    savePads();
    return;
  }
  // flick?
  const tr = ptr.trail;
  if (tr.length >= 2) {
    const a = tr[0], b = tr[tr.length - 1];
    const dt = Math.max(0.016, b.t - a.t);
    const vx = (b.x - a.x) / dt, vy = (b.y - a.y) / dt;
    const sp = Math.hypot(vx, vy);
    if (sp > 850 && ptr.path > 46) {
      // spin from path curvature
      let spin = 0;
      if (tr.length >= 3) {
        const m = tr[(tr.length / 2) | 0];
        const a1 = Math.atan2(m.y - a.y, m.x - a.x), a2 = Math.atan2(b.y - m.y, b.x - m.x);
        let dA = a2 - a1;
        while (dA > Math.PI) dA -= 6.283; while (dA < -Math.PI) dA += 6.283;
        spin = Math.max(-2.5, Math.min(2.5, dA * 5));
      }
      throwStone(b.x, b.y, vx * 0.82, vy * 0.82, spin);
      return;
    }
  }
  // tap?
  if (!ptr.moved && dur < 0.28) {
    // double-tap toggles rain
    if (nowS - lastTapT < 0.32 && Math.hypot(ptr.sx - lastTapX, ptr.sy - lastTapY) < 40) {
      toggleRain();
      lastTapT = 0;
      return;
    }
    lastTapT = nowS; lastTapX = ptr.sx; lastTapY = ptr.sy;
    splat(ptr.sx, ptr.sy, 2.0, -0.6, true);
    audio.plop(0.5, ptr.sx / W);
  }
}
function onCancel(e) {
  // a gesture claimed by the OS (edge swipe, control centre) is discarded, not classified
  if (extra.delete(e.pointerId)) return;
  if (!ptr.down || e.pointerId !== ptr.id) return;
  ptr.down = false; holdPt = null;
  if (ptr.pad) { ptr.pad.grabbed = false; ptr.pad = null; savePads(); }
}
addEventListener('pointerdown', e => { if (e.target.closest && e.target.closest('#ctl')) return; onDown(e); });
addEventListener('pointermove', onMove);
addEventListener('pointerup', onUp);
addEventListener('pointercancel', onCancel);
addEventListener('wheel', e => {
  const k = e.deltaMode === 1 ? 33 : e.deltaMode === 2 ? innerHeight : 1;
  setDay(dayT + e.deltaY * k * 0.00045, true);
}, { passive: true });
addEventListener('keydown', e => {
  if (e.target instanceof HTMLButtonElement || e.target instanceof HTMLInputElement) return;
  if (e.key === ' ' && !e.repeat) { e.preventDefault(); toggleRain(); }
  if ((e.key === 'f' || e.key === 'F') && !e.repeat) setFps(!showFps);
});

/* hold detection (runs in main loop) */
function updateHold(dt) {
  if (ptr.down && !ptr.pad && !ptr.moved) {
    ptr.holdTimer += dt;
    if (ptr.holdTimer > 0.55 && !holdPt) { holdPt = { x: ptr.x, y: ptr.y }; markHint('hold'); }
    if (holdPt) { holdPt.x = ptr.x; holdPt.y = ptr.y; }
  } else ptr.holdTimer = 0;
}

/* ---------- ambient idle life ---------- */
let ambT = 0;
function updateAmbient(dt) {
  idleT += dt;
  if (REDUCE || raining) return;
  if (idleT > 9) {
    ambT -= dt;
    if (ambT <= 0) {
      ambT = 2.4 + Math.random() * 3.5;
      const r = Math.random();
      if (r < 0.5) {
        const x = 60 + Math.random() * (W - 120), y = 60 + Math.random() * (H - 120);
        splat(x, y, 1.8, -0.35, true);
        if (Math.random() < 0.4) audio.rainNote(x / W);
      } else if (r < 0.8) {
        // a koi kisses the surface
        const k = koi[(Math.random() * koi.length) | 0];
        splat(k.x, k.y, 2.4, -0.4, true);
        audio.plop(0.2, k.x / W);
      } else {
        // breeze — a line of cat's-paws
        const y0 = H * (0.2 + Math.random() * 0.6), x0 = -20;
        for (let i = 0; i < 14; i++)
          setTimeout(() => splat(x0 + i * W / 13, y0 + Math.sin(i) * 40, 2.2, 0.12, false), i * 60);
      }
    }
  }
  // slow day drift — the light breathes even untouched
  setDay(dayT + autoDayDir * dt / 480, false);
  if (dayT >= 0.999) autoDayDir = -1;
  if (dayT <= 0.001) autoDayDir = 1;
  const v = Math.round(dayT * 1000);
  if (v !== lastSliderV) { lastSliderV = v; dayEl.value = v; }
}
let lastSliderV = -1;

/* ---------- HUD ---------- */
const hintEl = document.getElementById('hint');
const dayEl = document.getElementById('day');
const HINTS = [
  ['flick', 'flick — skip a stone across the water'],
  ['drag', 'drag — stir a wake'],
  ['pad', 'the lilypads ring; drag them to retune the pond'],
  ['hold', 'hold still — the koi are curious'],
  ['day', 'scroll, or slide the dial — deepen the night'],
  ['rain', 'double-tap — let it rain'],
];
let hintIdx = 0, hintShownT = 0, hintsDone = false;
const hintDone = new Set();
function markHint(key) { hintDone.add(key); }
function updateHints(dt) {
  if (hintsDone) return;
  hintShownT += dt;
  if (hintIdx >= HINTS.length) { hintsDone = true; hintEl.style.opacity = 0; return; }
  const [key, text] = HINTS[hintIdx];
  if (hintDone.has(key) || hintShownT > 12) {
    hintIdx++; hintShownT = 0;
    hintEl.style.opacity = 0;
    const idx = hintIdx;
    if (idx < HINTS.length)
      setTimeout(() => {
        if (idx === hintIdx && idx < HINTS.length) { hintEl.textContent = HINTS[idx][1]; hintEl.style.opacity = 1; }
      }, 1300);
  } else if (hintEl.textContent !== text && hintShownT > 1) {
    hintEl.textContent = text; hintEl.style.opacity = 1;
  }
}
document.getElementById('bSound').addEventListener('click', function() {
  audio.unlock();
  this.classList.toggle('on', audio.toggle());
});
const rainBtn = document.getElementById('bRain');
function toggleRain() {
  raining = !raining;
  rainBtn.classList.toggle('on', raining);
  markHint('rain');
  idleT = 0;
}
rainBtn.addEventListener('click', toggleRain);
dayEl.addEventListener('input', () => { setDay(dayEl.value / 1000, false); markHint('day'); });

/* ---------- resize + perf governor ---------- */
function resize() {
  W = innerWidth; H = innerHeight;
  dpr = Math.min(devicePixelRatio || 1, DPR_CAP);
  glc.width = Math.round(W * dpr); glc.height = Math.round(H * dpr);
  ovl.width = Math.round(W * dpr); ovl.height = Math.round(H * dpr);
  octx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (gl) gl.viewport(0, 0, glc.width, glc.height);
  const nSH = Math.max(96, Math.min(200, Math.round(SW * H / W)));
  if (nSH !== SH) {
    SH = nSH;
    U = new Float32Array(SW * SH); V = new Float32Array(SW * SH);
    sponge = new Float32Array(SW * SH); buildSponge();
    if (gl && texH) {
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, texH);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.R32F, SW, SH, 0, gl.RED, gl.FLOAT, U);
    }
  }
  undDirtySize = true;
}
let rszTimer = 0;
addEventListener('resize', () => { clearTimeout(rszTimer); rszTimer = setTimeout(resize, 150); });
let frameAcc = 0, frameN = 0, qLevel = 0, calmN = 0;
let mAcc = 0, mN = 0;                        // short window for the live fps readout
const fpsEl = document.getElementById('fps');
let showFps = DEBUG;
function setFps(on) { showFps = on; fpsEl.style.display = on ? 'block' : 'none'; }
function applyQuality(q) {
  qLevel = q;
  DPR_CAP = [2, 1.4, 1][q];
  uScale = [0.5, 0.42, 0.35][q];
  resize();
}
function govern(dtMs) {
  frameAcc += dtMs; frameN++;
  if (showFps) {
    mAcc += dtMs;
    if (++mN >= 20) {                       // refresh the meter ~3–6×/sec
      fpsEl.textContent = `${Math.round(1000 / (mAcc / mN))} fps · q${qLevel} · ${dpr.toFixed(2)}×`;
      mAcc = 0; mN = 0;
    }
  }
  if (frameN >= 90) {
    const avg = frameAcc / frameN;
    frameAcc = 0; frameN = 0;
    if (avg > 24 && qLevel < 2) { applyQuality(qLevel + 1); calmN = 0; }
    else if (avg < 14 && qLevel > 0) { if (++calmN >= 3) { applyQuality(qLevel - 1); calmN = 0; } }
    else calmN = 0;
  }
}
if (DEBUG) setFps(true);

/* ---------- main loop ---------- */
let nowS = 0, lastT = performance.now(), running = true, simAcc = 0, rafId = 0;
function frame(tms) {
  if (!running) return;
  rafId = requestAnimationFrame(frame);
  let dtMs = tms - lastT; lastT = tms;
  govern(dtMs);
  dtMs = Math.min(dtMs, 34);
  const dt = dtMs / 1000;
  nowS += dt;

  // fixed-timestep water so 60Hz and 120Hz displays ripple at the same speed
  simAcc += dtMs;
  const maxSteps = qLevel > 0 ? 2 : 4;
  let steps = 0;
  while (simAcc >= 8.33 && steps < maxSteps) { stepWater(1); simAcc -= 8.33; steps++; }
  if (steps === maxSteps) simAcc = 0;
  updateHold(dt);
  updateStones(dt);
  updatePads(dt);
  updateKoi(dt);
  updateDrops(dt);
  updateFlies(dt);
  updateRain(dt);
  updateAmbient(dtMs / 1000);
  updateHints(dtMs / 1000);
  audio.setEnergy(waterEnergy);

  paintUnder();
  if (glOK) {
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, texH);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, SW, SH, gl.RED, gl.FLOAT, U);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, texU);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, gl.RGBA, gl.UNSIGNED_BYTE, und);
    gl.uniform2f(uni.uSim, SW, SH);
    gl.uniform2f(uni.uRes, glc.width, glc.height);
    gl.uniform1f(uni.uTime, nowS);
    gl.uniform1f(uni.uDay, dayT);
    gl.uniform1f(uni.uRefr, TUNE.refr);
    gl.uniform1f(uni.uNrm, TUNE.nrm);
    gl.uniform1f(uni.uFoamLo, TUNE.foamLo);
    gl.uniform1f(uni.uFoamHi, TUNE.foamHi);
    gl.uniform1f(uni.uMotion, REDUCE ? 0 : 1);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }
  octx.clearRect(0, 0, W, H);
  drawPads(octx);
  drawStones(octx);
  drawDrops(octx);
  drawRain(octx);
  drawFlies(octx);
}
document.addEventListener('visibilitychange', () => {
  running = !document.hidden;
  audio.setHidden(document.hidden);
  if (running) {
    // a rAF queued before the tab hid survives the hide — cancel it or loops stack up
    cancelAnimationFrame(rafId);
    lastT = performance.now();
    rafId = requestAnimationFrame(frame);
  }
});

/* ---------- go ---------- */
resize();
initPads();
try { if (gl) initGL(); } catch (err) {
  document.getElementById('nogl').style.display = 'grid';
  console.error(err);
}
setDay(0.06, false);
// a first breath so the pond is alive on arrival
setTimeout(() => { splat(W * 0.62, H * 0.4, 2.5, -0.5, true); }, 600);
setTimeout(() => { splat(W * 0.3, H * 0.62, 2.0, -0.4, true); }, 1700);
hintEl.textContent = HINTS[0][1];
setTimeout(() => { hintEl.style.opacity = 1; }, 1400);
rafId = requestAnimationFrame(frame);
</script>

</html>
