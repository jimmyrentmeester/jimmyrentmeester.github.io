<!doctype html>
<html lang="en">
<head>

<title>Apps</title>
<style>

  body { margin:0; min-height:100vh; background:var(--bg); color:#e8ecf4; display:flex; align-items:center; justify-content:center;

  a { display:inline-block; margin:6px; padding:11px 20px; border-radius:12px; text-decoration:none; color:var(--cyan);

</style>

  <div>
    <h1 class="h">APPS</h1>
