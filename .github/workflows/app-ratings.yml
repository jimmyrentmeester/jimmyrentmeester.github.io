# Haalt dagelijks de App Store-ratings op en commit ze in de HTML.
# De bezoeker doet daardoor nog steeds nul externe requests.
#
# Uitzetten? Verwijder dit bestand. De cijfers blijven dan gewoon staan
# zoals ze op dat moment in de HTML stonden — er breekt niets.
name: App Store ratings

on:
  schedule:
    - cron: "17 6 * * *"   # dagelijks, 06:17 UTC
  workflow_dispatch:        # en handmatig vanaf het Actions-tabblad

permissions:
  contents: write

concurrency:
  group: app-ratings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ratings ophalen en HTML bijwerken
        run: python3 scripts/update-ratings.py

      - name: Committen als er iets veranderd is
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Niets veranderd."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html nl/index.html
          git commit -m "site: App Store-ratings bijgewerkt"
          git push
